<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Cocos Creator | game</title>

  <meta name="viewport"
        content="width=device-width,user-scalable=no,initial-scale=1,minimum-scale=1,maximum-scale=1,minimal-ui=true"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">
  <meta name="renderer" content="webkit"/>
  <meta name="force-rendering" content="webkit"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="msapplication-tap-highlight" content="no">
  <meta name="full-screen" content="yes"/>
  <meta name="x5-fullscreen" content="true"/>
  <meta name="360-fullscreen" content="true"/>
  <meta name="x5-page-mode" content="app">

  <link rel="stylesheet" type="text/css" href="style.css"/>

  <!-- ★ 关键：强制透明样式，同时也改 style.css 更稳妥 -->
  <style>
    html, body {
      background: transparent !important;
    }
    #GameDiv, #Cocos3dGameContainer {
      background: transparent !important;
    }
    #GameCanvas {
      background: transparent !important;
    }
  </style>
</head>
<body>
  <div id="GameDiv" cc_exact_fit_screen="true">
    <div id="Cocos3dGameContainer">
      <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="99" style="background: transparent;"></canvas>
    </div>
  </div>

  <!-- Polyfills bundle. -->
  <script src="src/polyfills.bundle.js" charset="utf-8"> </script>
  <!-- SystemJS support. -->
  <script src="src/system.bundle.js" charset="utf-8"> </script>
  <!-- Import map -->
  <script src="src/import-map.json" type="systemjs-importmap" charset="utf-8"> </script>

  <!-- ★ 在引擎启动前，强制把透明配置写入设置，这是让 Cocos 渲染透明背景的关键 -->
  <script>
    // 确保 cc 对象存在（防止未定义）
    window.cc = window.cc || {};
    // 如果项目有 settings 文件，下面这行也能覆盖
    window._CCSettings = window._CCSettings || {};
    window._CCSettings.transparent = true;
    // 再挂一个全局 config（可能被 Cocos 读取）
    if (window.cc && !window.cc.game) window.cc.game = {};
    if (window.cc.game) window.cc.game.config = window.cc.game.config || {};
    if (window.cc.game) window.cc.game.config.transparent = true;
  </script>

  <script>
    System.import('./index.js').catch(function(err) { console.error(err); })
  </script>
</body>
</html>
